<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Shield gradient: app accent blue top to deep blue bottom -->
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#3861be"/>
    </linearGradient>
    <!-- Clock face subtle highlight -->
    <radialGradient id="clockGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </radialGradient>
    <clipPath id="shieldClip">
      <polygon points="32,2 61,8 61,36 32,62 3,36 3,8"/>
    </clipPath>
  </defs>

  <!-- Shield body -->
  <polygon points="32,2 61,8 61,36 32,62 3,36 3,8"
           fill="url(#shieldGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- Inner clock face (clipped to shield) -->
  <g clip-path="url(#shieldClip)">
    <!-- Clock background -->
    <circle cx="32" cy="30" r="15" fill="url(#clockGrad)" stroke="rgba(255,255,255,0.75)" stroke-width="1.2"/>

    <!-- Hour tick marks -->
    <g stroke="rgba(255,255,255,0.6)" stroke-width="0.9" stroke-linecap="round">
      <!-- 12 -->  <line x1="32" y1="16.5" x2="32" y2="18.8"/>
      <!-- 1 -->   <line x1="38.5" y1="17.8" x2="37.6" y2="19.9"/>
      <!-- 2 -->   <line x1="43.4" y1="22.5" x2="41.8" y2="23.8"/>
      <!-- 3 -->   <line x1="45.5" y1="30" x2="43.2" y2="30"/>
      <!-- 4 -->   <line x1="43.4" y1="37.5" x2="41.8" y2="36.2"/>
      <!-- 5 -->   <line x1="38.5" y1="42.2" x2="37.6" y2="40.1"/>
      <!-- 6 -->   <line x1="32" y1="43.5" x2="32" y2="41.2"/>
      <!-- 7 -->   <line x1="25.5" y1="42.2" x2="26.4" y2="40.1"/>
      <!-- 8 -->   <line x1="20.6" y1="37.5" x2="22.2" y2="36.2"/>
      <!-- 9 -->   <line x1="18.5" y1="30" x2="20.8" y2="30"/>
      <!-- 10 -->  <line x1="20.6" y1="22.5" x2="22.2" y2="23.8"/>
      <!-- 11 -->  <line x1="25.5" y1="17.8" x2="26.4" y2="19.9"/>
    </g>

    <!-- Quarter tick marks (slightly longer) -->
    <g stroke="rgba(255,255,255,0.9)" stroke-width="1.2" stroke-linecap="round">
      <line x1="32"    y1="15.5" x2="32"    y2="18.8"/>  <!-- 12 -->
      <line x1="45.5"  y1="30"   x2="43.2"  y2="30"  />  <!-- 3 -->
      <line x1="32"    y1="44.5" x2="32"    y2="41.2"/>  <!-- 6 -->
      <line x1="18.5"  y1="30"   x2="20.8"  y2="30"  />  <!-- 9 -->
    </g>

    <!-- Minute hand → 12 o'clock -->
    <line x1="32" y1="30" x2="32" y2="18"
          stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Hour hand → 9 o'clock -->
    <line x1="32" y1="30" x2="23" y2="30"
          stroke="white" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Centre pivot -->
    <circle cx="32" cy="30" r="1.5" fill="white"/>
  </g>
</svg>
